<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="98" fill="#0C2340"/>

  <!-- Anillo exterior dorado -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#C9A84C" stroke-width="4"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="4 2"/>

  <!-- Texto circular superior: MUDINTER MASCOTAS -->
  <path id="upper-arc" fill="none"
        d="M 100 100 m -72 0 a 72 72 0 1 1 144 0"/>
  <text font-family="Montserrat, sans-serif" font-size="12" font-weight="700"
        fill="#C9A84C" letter-spacing="3">
    <textPath href="#upper-arc" startOffset="7%">MUDINTER MASCOTAS</textPath>
  </text>

  <!-- Texto circular inferior: TRANSPORTE INTERNACIONAL -->
  <path id="lower-arc" fill="none"
        d="M 28 100 a 72 72 0 0 0 144 0"/>
  <text font-family="Montserrat, sans-serif" font-size="10" font-weight="600"
        fill="#C9A84C" letter-spacing="2">
    <textPath href="#lower-arc" startOffset="7%">TRANSPORTE INTERNACIONAL</textPath>
  </text>

  <!-- Separadores laterales dorados -->
  <circle cx="28"  cy="100" r="3" fill="#C9A84C"/>
  <circle cx="172" cy="100" r="3" fill="#C9A84C"/>

  <!-- Huella de pata (centro-arriba) -->
  <!-- Almohadilla central -->
  <ellipse cx="100" cy="108" rx="14" ry="11" fill="#C9A84C"/>
  <!-- Dedos -->
  <ellipse cx="84"  cy="93"  rx="6"  ry="8"  fill="#C9A84C" transform="rotate(-15,84,93)"/>
  <ellipse cx="95"  cy="88"  rx="6"  ry="8"  fill="#C9A84C"/>
  <ellipse cx="106" cy="88"  rx="6"  ry="8"  fill="#C9A84C"/>
  <ellipse cx="117" cy="93"  rx="6"  ry="8"  fill="#C9A84C" transform="rotate(15,117,93)"/>

  <!-- Avión estilizado (pequeño, dentro del centro) -->
  <g transform="translate(100,109) rotate(-40) scale(0.55)">
    <polygon points="0,-22 6,-6 0,-10 -6,-6" fill="#0C2340"/>
    <polygon points="-18,2 0,-6 18,2 0,-2" fill="#0C2340"/>
    <polygon points="-8,12 0,6 8,12 0,9" fill="#0C2340"/>
  </g>

  <!-- Cinta inferior "VERIFICADO" -->
  <rect x="52" y="148" width="96" height="20" rx="4" fill="#C9A84C"/>
  <text x="100" y="162" text-anchor="middle"
        font-family="Montserrat, sans-serif" font-size="10" font-weight="800"
        fill="#0C2340" letter-spacing="2.5">VERIFICADO</text>
</svg>
